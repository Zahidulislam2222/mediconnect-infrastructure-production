  # v2 Lambdas (actively deployed, in TF)
  - name: mediconnect-cognito-triggers
    tf_file: environments/prod/lambda_us.tf + lambda_eu.tf
    app_files: [backend_v2/cognito-triggers/index.mjs]
    status: OK

  - name: mediconnect-ws-authorizer
