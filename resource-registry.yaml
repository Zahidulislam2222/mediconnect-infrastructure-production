# ============================================================================
# Resource Registry — Single Source of Truth
# ============================================================================
# Maps every cloud resource the app code references to its Terraform file
# and the app files that use it. Any agent adding a new resource MUST update
# this file. Run `bash verify_app_vs_iac.sh` to validate.
#
# Legend:
#   status: OK | MISSING_TF | MISSING_APP | ORPHANED | CODE_READY
#   OK          = App references it AND Terraform manages it
#   MISSING_TF  = App references it but NO Terraform coverage
#   MISSING_APP = Terraform manages it but no app code references it
#   ORPHANED    = In Terraform but confirmed unused
#   CODE_READY  = Terraform code written but not yet applied
# ============================================================================

last_updated: "2026-04-05"
last_verified_by: "verify_app_vs_iac.sh"

