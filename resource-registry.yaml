    app_files: [backend_v2/ws-authorizer/index.mjs]
    status: OK

  - name: mediconnect-cleanup-recordings
    tf_file: environments/prod/lambda_us.tf + lambda_eu.tf
    app_files: [backend_v2/cleanup-recordings/index.mjs]
    status: OK

  - name: mediconnect-failover-proxy
    tf_file: environments/prod/lambda_us.tf + lambda_eu.tf
    app_files: [backend_v2/failover-proxy/index.mjs]
    status: OK

  - name: mediconnect-auto-group-us
    tf_file: environments/prod/lambda_us.tf
    app_files: []
    note: "Cognito auto-group assignment — US only"
    status: OK

  - name: mediconnect-auto-group-eu
    tf_file: environments/prod/lambda_eu.tf
    app_files: []
    note: "Cognito auto-group assignment — EU only"
    status: OK

  # Legacy Lambdas (29 functions in legacy_lambdas/ — in AWS but NOT in TF)
  # These are deployed by CI/CD directly, not managed by Terraform.
  # They are being replaced by the v2 containerized services.
  - name: legacy_lambdas (29 functions)
    tf_file: NOT_MANAGED
    app_files: [legacy_lambdas/*/]
    note: >
      Legacy Lambda functions exist in AWS and are deployed by CI/CD (deploy-lambdas job).
      They are NOT in Terraform. This is intentional — they are being replaced by
      backend_v2 containerized services. The event-bus gracefully degrades if queues
      are unavailable.
    status: OK

