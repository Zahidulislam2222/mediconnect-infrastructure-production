name: "🚀 Enterprise Multi-Cloud Deploy (Mediconnect)"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend_v2/**'

permissions:
  id-token: write
  contents: read

env:
  AZURE_ACR: "zahidmediconnectacr.azurecr.io"
  AWS_ECR: "950110266426.dkr.ecr.eu-central-1.amazonaws.com"
  GCP_GAR: "us-central1-docker.pkg.dev/mediconnect-analytics/mediconnect-repo"
  AKS_CLUSTER: "mediconnect-aks-us"
  AKS_RESOURCE_GROUP: "mediconnect-rg"
  EKS_CLUSTER: "mediconnect-eks-eu"

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend_v2/package-lock.json
      - run: cd backend_v2 && npm ci
      - run: cd backend_v2 && npm test

  build-and-push:
    needs: [test-and-lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: patient-service
            port: 8081
          - service: doctor-service
            port: 8082
          - service: booking-service
            port: 8083
          - service: communication-service
            port: 8084
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2

      - run: az acr login --name zahidmediconnectacr
      - run: aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin ${{ env.AWS_ECR }}
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: "🐳 Build and Push Immutable Artifact"
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t local-img -f backend_v2/${{ matrix.service }}/Dockerfile .
          docker tag local-img ${{ env.AZURE_ACR }}/${{ matrix.service }}:$IMAGE_TAG
          docker push ${{ env.AZURE_ACR }}/${{ matrix.service }}:$IMAGE_TAG
          docker tag local-img ${{ env.AWS_ECR }}/${{ matrix.service }}:$IMAGE_TAG
          docker push ${{ env.AWS_ECR }}/${{ matrix.service }}:$IMAGE_TAG
          docker tag local-img ${{ env.GCP_GAR }}/${{ matrix.service }}:$IMAGE_TAG
          docker push ${{ env.GCP_GAR }}/${{ matrix.service }}:$IMAGE_TAG

  deploy-staging:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: patient-service
            port: 8081
          - service: doctor-service
            port: 8082
          - service: booking-service
            port: 8083
          - service: communication-service
            port: 8084
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1
      
      - name: "🔐 Fetch Kubeconfigs"
        run: |
          az aks get-credentials --resource-group ${{ env.AKS_RESOURCE_GROUP }} --name ${{ env.AKS_CLUSTER }} --file aks.kubeconfig
          aws eks update-kubeconfig --region eu-central-1 --name ${{ env.EKS_CLUSTER }} --kubeconfig eks.kubeconfig

      - name: "🏗️ Prepare Cluster Foundation & Secrets"
        run: |
          kubectl --kubeconfig=aks.kubeconfig apply -f backend_v2/k8s/namespaces.yaml
          kubectl --kubeconfig=eks.kubeconfig apply -f backend_v2/k8s/namespaces.yaml
          kubectl --kubeconfig=aks.kubeconfig create secret generic aws-vault-keys --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} -n mediconnect-staging --dry-run=client -o yaml | kubectl --kubeconfig=aks.kubeconfig apply -f -
          kubectl --kubeconfig=eks.kubeconfig create secret generic aws-vault-keys --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} -n mediconnect-staging --dry-run=client -o yaml | kubectl --kubeconfig=eks.kubeconfig apply -f -

      - name: "🚀 Deploy Staging (AKS)"
        run: |
          IMAGE=${{ env.AZURE_ACR }}/${{ matrix.service }}:${{ github.sha }}
          sed -e "s|__IMAGE_URI__|$IMAGE|g" -e "s|__AWS_REGION__|us-east-1|g" \
              backend_v2/k8s/${{ matrix.service }}.yaml | kubectl --kubeconfig=aks.kubeconfig apply -n mediconnect-staging -f -
          kubectl --kubeconfig=aks.kubeconfig rollout status deployment/${{ matrix.service }} -n mediconnect-staging --timeout=90s

      - name: "🚀 Deploy Staging (EKS)"
        run: |
          IMAGE=${{ env.AWS_ECR }}/${{ matrix.service }}:${{ github.sha }}
          # 🟢 FIXED: Targeted Staging Namespace
          sed -e "s|__IMAGE_URI__|$IMAGE|g" -e "s|__AWS_REGION__|eu-central-1|g" \
              backend_v2/k8s/${{ matrix.service }}.yaml | kubectl --kubeconfig=eks.kubeconfig apply -n mediconnect-staging -f -
          kubectl --kubeconfig=eks.kubeconfig rollout status deployment/${{ matrix.service }} -n mediconnect-staging --timeout=90s

      - name: "🧪 Smoke Test (AKS)"
        run: |
          kubectl --kubeconfig=aks.kubeconfig run smoke-test-${{ matrix.service }} --image=curlimages/curl --restart=Never -n mediconnect-staging -- curl -f -v http://${{ matrix.service }}:80/ready
          kubectl --kubeconfig=aks.kubeconfig wait --for=condition=Ready pod/smoke-test-${{ matrix.service }} -n mediconnect-staging --timeout=60s
          kubectl --kubeconfig=aks.kubeconfig delete pod smoke-test-${{ matrix.service }} -n mediconnect-staging

      - name: "🧪 Smoke Test (EKS)"
        run: |
          kubectl --kubeconfig=eks.kubeconfig run smoke-test-eks-${{ matrix.service }} --image=curlimages/curl --restart=Never -n mediconnect-staging -- curl -f -v http://${{ matrix.service }}:80/ready
          kubectl --kubeconfig=eks.kubeconfig wait --for=condition=Ready pod/smoke-test-eks-${{ matrix.service }} -n mediconnect-staging --timeout=60s
          kubectl --kubeconfig=eks.kubeconfig delete pod smoke-test-eks-${{ matrix.service }} -n mediconnect-staging

  deploy-production:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        include:
          - service: patient-service
            port: 8081
          - service: doctor-service
            port: 8082
          - service: booking-service
            port: 8083
          - service: communication-service
            port: 8084
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: "🔐 Fetch Kubeconfigs"
        run: |
          az aks get-credentials --resource-group ${{ env.AKS_RESOURCE_GROUP }} --name ${{ env.AKS_CLUSTER }} --file aks.kubeconfig
          aws eks update-kubeconfig --region eu-central-1 --name ${{ env.EKS_CLUSTER }} --kubeconfig eks.kubeconfig

      - name: "🏗️ Prepare Cluster Foundation & Secrets"
        run: |
          kubectl --kubeconfig=aks.kubeconfig apply -f backend_v2/k8s/namespaces.yaml
          kubectl --kubeconfig=eks.kubeconfig apply -f backend_v2/k8s/namespaces.yaml
          kubectl --kubeconfig=aks.kubeconfig create secret generic aws-vault-keys --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} -n mediconnect-prod --dry-run=client -o yaml | kubectl --kubeconfig=aks.kubeconfig apply -f -
          kubectl --kubeconfig=eks.kubeconfig create secret generic aws-vault-keys --from-literal=AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} --from-literal=AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} -n mediconnect-prod --dry-run=client -o yaml | kubectl --kubeconfig=eks.kubeconfig apply -f -

      - name: "🚀 Deploy Prod (AKS)"
        run: |
          IMAGE=${{ env.AZURE_ACR }}/${{ matrix.service }}:${{ github.sha }}
          sed -e "s|__IMAGE_URI__|$IMAGE|g" -e "s|__AWS_REGION__|us-east-1|g" \
              backend_v2/k8s/${{ matrix.service }}.yaml | kubectl --kubeconfig=aks.kubeconfig apply -n mediconnect-prod -f -
          kubectl --kubeconfig=aks.kubeconfig rollout status deployment/${{ matrix.service }} -n mediconnect-prod --timeout=120s

      - name: "🚀 Deploy Prod (EKS)"
        run: |
          IMAGE=${{ env.AWS_ECR }}/${{ matrix.service }}:${{ github.sha }}
          sed -e "s|__IMAGE_URI__|$IMAGE|g" -e "s|__AWS_REGION__|eu-central-1|g" \
              backend_v2/k8s/${{ matrix.service }}.yaml | kubectl --kubeconfig=eks.kubeconfig apply -n mediconnect-prod -f -
          kubectl --kubeconfig=eks.kubeconfig rollout status deployment/${{ matrix.service }} -n mediconnect-prod --timeout=120s

      - name: "🔄 Auto Rollback If Failed"
        if: failure()
        run: |
          kubectl --kubeconfig=aks.kubeconfig rollout undo deployment/${{ matrix.service }} -n mediconnect-prod || true
          kubectl --kubeconfig=eks.kubeconfig rollout undo deployment/${{ matrix.service }} -n mediconnect-prod || true

      - name: "🚀 Deploy Backup (GCP US)"
        run: |
          # 🟢 FIXED: Added AWS Secrets for Vault Sync
          gcloud run deploy ${{ matrix.service }}-us-backup \
            --image ${{ env.GCP_GAR }}/${{ matrix.service }}:${{ github.sha }} \
            --region us-central1 \
            --port ${{ matrix.port }} \
            --min-instances 0 \
            --set-env-vars "NODE_ENV=production,AWS_REGION=us-east-1,AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }},AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --platform managed \
            --allow-unauthenticated

      - name: "🚀 Deploy Backup (GCP EU)"
        run: |
          # 🟢 FIXED: Added AWS Secrets for Vault Sync
          gcloud run deploy ${{ matrix.service }}-eu-backup \
            --image ${{ env.GCP_GAR }}/${{ matrix.service }}:${{ github.sha }} \
            --region europe-west3 \
            --port ${{ matrix.port }} \
            --min-instances 0 \
            --set-env-vars "NODE_ENV=production,AWS_REGION=eu-central-1,AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }},AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            --platform managed \
            --allow-unauthenticated