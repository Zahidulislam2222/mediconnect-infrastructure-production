name: "🚀 Enterprise Multi-Cloud Deploy (Mediconnect)"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend_v2/**'

permissions:
  id-token: write
  contents: read

env:
  AZURE_ACR: "zahidmediconnectacr.azurecr.io"
  AWS_ECR: "950110266426.dkr.ecr.eu-central-1.amazonaws.com"
  GCP_GAR: "us-central1-docker.pkg.dev/mediconnect-analytics/mediconnect-repo"
  AKS_CLUSTER: "mediconnect-aks-us"
  AKS_RESOURCE_GROUP: "mediconnect-rg"
  EKS_CLUSTER: "mediconnect-eks-eu"

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: backend_v2/package-lock.json
      - run: cd backend_v2 && npm ci
      - run: cd backend_v2 && npm test

  build-and-push:
    needs: [test-and-lint]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: patient-service
            port: 8081
          - service: doctor-service
            port: 8082
          - service: booking-service
            port: 8083
          - service: communication-service
            port: 8084
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2

      - if: false
        run: az acr login --name zahidmediconnectacr
      - if: false
        run: aws ecr get-login-password --region eu-central-1 | docker login --username AWS --password-stdin ${{ env.AWS_ECR }}
      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: "🐳 Build and Push Immutable Artifact"
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t local-img -f backend_v2/${{ matrix.service }}/Dockerfile .
          # docker tag local-img ${{ env.AZURE_ACR }}/${{ matrix.service }}:$IMAGE_TAG
          # docker push ${{ env.AZURE_ACR }}/${{ matrix.service }}:$IMAGE_TAG
          # docker tag local-img ${{ env.AWS_ECR }}/${{ matrix.service }}:$IMAGE_TAG
          # docker push ${{ env.AWS_ECR }}/${{ matrix.service }}:$IMAGE_TAG
          docker tag local-img ${{ env.GCP_GAR }}/${{ matrix.service }}:$IMAGE_TAG
          docker push ${{ env.GCP_GAR }}/${{ matrix.service }}:$IMAGE_TAG

  prepare-infrastructure:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1
      
      - name: "🔐 Fetch Kubeconfigs"
        if: false
        run: |
          az aks get-credentials --resource-group ${{ env.AKS_RESOURCE_GROUP }} --name ${{ env.AKS_CLUSTER }} --file aks.kubeconfig
          aws eks update-kubeconfig --region eu-central-1 --name ${{ env.EKS_CLUSTER }} --kubeconfig eks.kubeconfig

      - name: "🏗️ Setup Multi-Env Routing & Identity"
        if: false
        run: |
          # 1. Apply Identities (Injecting 4 Separate Role ARNs)
          # Note: We map specific AWS Roles. For Azure, we map the Client ID.
          
          sed -e "s|__AZURE_PATIENT_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g" \
              -e "s|__AZURE_DOCTOR_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g" \
              -e "s|__AZURE_BOOKING_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g" \
              -e "s|__AZURE_COMM_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g" \
              -e "s|__EKS_PATIENT_ROLE_ARN__|${{ secrets.EKS_PATIENT_ROLE_ARN }}|g" \
              -e "s|__EKS_DOCTOR_ROLE_ARN__|${{ secrets.EKS_DOCTOR_ROLE_ARN }}|g" \
              -e "s|__EKS_BOOKING_ROLE_ARN__|${{ secrets.EKS_BOOKING_ROLE_ARN }}|g" \
              -e "s|__EKS_COMM_ROLE_ARN__|${{ secrets.EKS_COMM_ROLE_ARN }}|g" \
              backend_v2/k8s/namespaces.yaml | kubectl --kubeconfig=aks.kubeconfig apply -f -

          sed -e "s|__AZURE_PATIENT_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g" \
              -e "s|__AZURE_DOCTOR_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g" \
              -e "s|__AZURE_BOOKING_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g" \
              -e "s|__AZURE_COMM_CLIENT_ID__|${{ secrets.AZURE_CLIENT_ID }}|g" \
              -e "s|__EKS_PATIENT_ROLE_ARN__|${{ secrets.EKS_PATIENT_ROLE_ARN }}|g" \
              -e "s|__EKS_DOCTOR_ROLE_ARN__|${{ secrets.EKS_DOCTOR_ROLE_ARN }}|g" \
              -e "s|__EKS_BOOKING_ROLE_ARN__|${{ secrets.EKS_BOOKING_ROLE_ARN }}|g" \
              -e "s|__EKS_COMM_ROLE_ARN__|${{ secrets.EKS_COMM_ROLE_ARN }}|g" \
              backend_v2/k8s/namespaces.yaml | kubectl --kubeconfig=eks.kubeconfig apply -f -
          
          # 2. Setup Staging Gateway
          sed "s|__PREFIX__|staging/|g" backend_v2/k8s/api-gateway.yaml | kubectl --kubeconfig=aks.kubeconfig apply -n mediconnect-staging -f -
          sed "s|__PREFIX__|staging/|g" backend_v2/k8s/api-gateway.yaml | kubectl --kubeconfig=eks.kubeconfig apply -n mediconnect-staging -f -
          
          # 3. Setup Production Gateway
          sed "s|__PREFIX__||g" backend_v2/k8s/api-gateway.yaml | kubectl --kubeconfig=aks.kubeconfig apply -n mediconnect-prod -f -
          sed "s|__PREFIX__||g" backend_v2/k8s/api-gateway.yaml | kubectl --kubeconfig=eks.kubeconfig apply -n mediconnect-prod -f -

  deploy-staging:
    needs: [prepare-infrastructure]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1   # 🟢 FIX 1: Prevents Cluster CPU Exhaustion during rollout
      matrix:
        include:
          - service: patient-service
            port: 8081
          - service: doctor-service
            port: 8082
          - service: booking-service
            port: 8083
          - service: communication-service
            port: 8084
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1
      
      - name: "🔐 Fetch Kubeconfigs"
        if: false
        run: |
          az aks get-credentials --resource-group ${{ env.AKS_RESOURCE_GROUP }} --name ${{ env.AKS_CLUSTER }} --file aks.kubeconfig
          aws eks update-kubeconfig --region eu-central-1 --name ${{ env.EKS_CLUSTER }} --kubeconfig eks.kubeconfig

      - name: "🚀 Deploy Staging (AKS)"
        if: false
        run: |
          IMAGE=${{ env.AZURE_ACR }}/${{ matrix.service }}:${{ github.sha }}
          
          # 🟢 LOGIC SWITCH ADDED
          if [ "${{ matrix.service }}" == "patient-service" ]; then
             ROLE_ARN="${{ secrets.EKS_PATIENT_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "doctor-service" ]; then
             ROLE_ARN="${{ secrets.EKS_DOCTOR_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "booking-service" ]; then
             ROLE_ARN="${{ secrets.EKS_BOOKING_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "communication-service" ]; then
             ROLE_ARN="${{ secrets.EKS_COMM_ROLE_ARN }}"
          fi

          PUBLIC_DOMAIN="staging-${{ vars.AKS_DOMAIN }}" 

          sed -e "s|__IMAGE_URI__|$IMAGE|g" \
              -e "s|__PUBLIC_DOMAIN__|$PUBLIC_DOMAIN|g" \
              -e "s|__AWS_REGION__|us-east-1|g" \
              -e "s|__MIN_REPLICAS__|1|g" \
              -e "s|__MAX_REPLICAS__|1|g" \
              -e "s|__AWS_ROLE_ARN__|$ROLE_ARN|g" \
              -e "s|__TOKEN_FILE__|/var/run/secrets/azure/tokens/azure-identity-token|g" \
              backend_v2/k8s/${{ matrix.service }}.yaml | kubectl --kubeconfig=aks.kubeconfig apply -n mediconnect-staging -f -
          
          kubectl --kubeconfig=aks.kubeconfig rollout status deployment/${{ matrix.service }} -n mediconnect-staging --timeout=900s

      - name: "🚀 Deploy Staging (EKS)"
        if: false
        run: |
          IMAGE=${{ env.AWS_ECR }}/${{ matrix.service }}:${{ github.sha }}
          
          # 🟢 LOGIC SWITCH ADDED
          if [ "${{ matrix.service }}" == "patient-service" ]; then
             ROLE_ARN="${{ secrets.EKS_PATIENT_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "doctor-service" ]; then
             ROLE_ARN="${{ secrets.EKS_DOCTOR_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "booking-service" ]; then
             ROLE_ARN="${{ secrets.EKS_BOOKING_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "communication-service" ]; then
             ROLE_ARN="${{ secrets.EKS_COMM_ROLE_ARN }}"
          fi

          PUBLIC_DOMAIN="staging-${{ vars.EKS_DOMAIN }}" 

          sed -e "s|__IMAGE_URI__|$IMAGE|g" \
              -e "s|__PUBLIC_DOMAIN__|$PUBLIC_DOMAIN|g" \
              -e "s|__AWS_REGION__|eu-central-1|g" \
              -e "s|__MIN_REPLICAS__|1|g" \
              -e "s|__MAX_REPLICAS__|1|g" \
              -e "s|__AWS_ROLE_ARN__|$ROLE_ARN|g" \
              -e "s|__TOKEN_FILE__|/var/run/secrets/eks.amazonaws.com/serviceaccount/token|g" \
              backend_v2/k8s/${{ matrix.service }}.yaml | kubectl --kubeconfig=eks.kubeconfig apply -n mediconnect-staging -f -
              
          kubectl --kubeconfig=eks.kubeconfig rollout status deployment/${{ matrix.service }} -n mediconnect-staging --timeout=900s

      - name: "🧪 Smoke Test (AKS)"
        if: false
        run: |
          POD_NAME=$(kubectl --kubeconfig=aks.kubeconfig get pods -n mediconnect-staging -l app=${{ matrix.service }} --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
          kubectl --kubeconfig=aks.kubeconfig exec $POD_NAME -n mediconnect-staging -- wget -qO- http://127.0.0.1:${{ matrix.port }}/ready

      - name: "🧪 Smoke Test (EKS)"
        if: false
        run: |
          POD_NAME=$(kubectl --kubeconfig=eks.kubeconfig get pods -n mediconnect-staging -l app=${{ matrix.service }} --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
          kubectl --kubeconfig=eks.kubeconfig exec $POD_NAME -n mediconnect-staging -- wget -qO- http://127.0.0.1:${{ matrix.port }}/ready

  deploy-production:
    needs: [deploy-staging]
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        include:
          - service: patient-service
            port: 8081
          - service: doctor-service
            port: 8082
          - service: booking-service
            port: 8083
          - service: communication-service
            port: 8084
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: eu-central-1
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: "🔐 Fetch Kubeconfigs"
        if: false
        run: |
          az aks get-credentials --resource-group ${{ env.AKS_RESOURCE_GROUP }} --name ${{ env.AKS_CLUSTER }} --file aks.kubeconfig
          aws eks update-kubeconfig --region eu-central-1 --name ${{ env.EKS_CLUSTER }} --kubeconfig eks.kubeconfig

      - name: "🚀 Deploy Prod (AKS)"
        if: false
        run: |
          IMAGE=${{ env.AZURE_ACR }}/${{ matrix.service }}:${{ github.sha }}

          if [ "${{ matrix.service }}" == "patient-service" ]; then
             ROLE_ARN="${{ secrets.EKS_PATIENT_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "doctor-service" ]; then
             ROLE_ARN="${{ secrets.EKS_DOCTOR_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "booking-service" ]; then
             ROLE_ARN="${{ secrets.EKS_BOOKING_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "communication-service" ]; then
             ROLE_ARN="${{ secrets.EKS_COMM_ROLE_ARN }}"
          fi

          PUBLIC_DOMAIN="${{ vars.AKS_DOMAIN }}"

          # 🟢 FIXED: Comments removed from line ends to prevent syntax error
          sed -e "s|__IMAGE_URI__|$IMAGE|g" \
              -e "s|__PUBLIC_DOMAIN__|$PUBLIC_DOMAIN|g" \
              -e "s|__ALLOWED_ORIGINS__|${{ vars.ALLOWED_ORIGINS }}|g" \
              -e "s|__AWS_REGION__|us-east-1|g" \
              -e "s|__MIN_REPLICAS__|1|g" \
              -e "s|__MAX_REPLICAS__|5|g" \
              -e "s|__AWS_ROLE_ARN__|$ROLE_ARN|g" \
              -e "s|__TOKEN_FILE__|/var/run/secrets/azure/tokens/azure-identity-token|g" \
              backend_v2/k8s/${{ matrix.service }}.yaml | kubectl --kubeconfig=aks.kubeconfig apply -n mediconnect-prod -f -
          
          kubectl --kubeconfig=aks.kubeconfig rollout status deployment/${{ matrix.service }} -n mediconnect-prod --timeout=900s

      - name: "🚀 Deploy Prod (EKS)"
        if: false
        run: |
          IMAGE=${{ env.AWS_ECR }}/${{ matrix.service }}:${{ github.sha }}

          if [ "${{ matrix.service }}" == "patient-service" ]; then
             ROLE_ARN="${{ secrets.EKS_PATIENT_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "doctor-service" ]; then
             ROLE_ARN="${{ secrets.EKS_DOCTOR_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "booking-service" ]; then
             ROLE_ARN="${{ secrets.EKS_BOOKING_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "communication-service" ]; then
             ROLE_ARN="${{ secrets.EKS_COMM_ROLE_ARN }}"
          fi

          PUBLIC_DOMAIN="${{ vars.EKS_DOMAIN }}"

          # 🟢 FIXED: No comments allowed after backslash
          sed -e "s|__IMAGE_URI__|$IMAGE|g" \
              -e "s|__PUBLIC_DOMAIN__|$PUBLIC_DOMAIN|g" \
              -e "s|__ALLOWED_ORIGINS__|${{ vars.ALLOWED_ORIGINS }}|g" \
              -e "s|__AWS_REGION__|eu-central-1|g" \
              -e "s|__MIN_REPLICAS__|1|g" \
              -e "s|__MAX_REPLICAS__|5|g" \
              -e "s|__AWS_ROLE_ARN__|$ROLE_ARN|g" \
              -e "s|__TOKEN_FILE__|/var/run/secrets/eks.amazonaws.com/serviceaccount/token|g" \
              backend_v2/k8s/${{ matrix.service }}.yaml | kubectl --kubeconfig=eks.kubeconfig apply -n mediconnect-prod -f -
          
          kubectl --kubeconfig=eks.kubeconfig rollout status deployment/${{ matrix.service }} -n mediconnect-prod --timeout=900s

      - name: "🔄 Auto Rollback If Failed"
        if: false
        # if: failure()
        run: |
          kubectl --kubeconfig=aks.kubeconfig rollout undo deployment/${{ matrix.service }} -n mediconnect-prod || true
          kubectl --kubeconfig=eks.kubeconfig rollout undo deployment/${{ matrix.service }} -n mediconnect-prod || true

      - name: "🚀 Deploy Backup (GCP US)"
        run: |
          if [ "${{ matrix.service }}" == "patient-service" ]; then
             ROLE_ARN="${{ secrets.EKS_PATIENT_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "doctor-service" ]; then
             ROLE_ARN="${{ secrets.EKS_DOCTOR_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "booking-service" ]; then
             ROLE_ARN="${{ secrets.EKS_BOOKING_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "communication-service" ]; then
             ROLE_ARN="${{ secrets.EKS_COMM_ROLE_ARN }}"
          fi

          # 🟢 FIXED: Added missing \ after env-vars
          gcloud run deploy ${{ matrix.service }}-us-backup \
            --image ${{ env.GCP_GAR }}/${{ matrix.service }}:${{ github.sha }} \
            --region us-central1 \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}" \
            --port ${{ matrix.port }} \
            --min-instances 0 \
            --set-env-vars "NODE_ENV=production,API_PUBLIC_URL=${{ vars.GCP_DOCTOR_US_DOMAIN }},AWS_REGION=us-east-1,AWS_ROLE_ARN=$ROLE_ARN,AWS_EC2_METADATA_DISABLED=true,ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" \
            --platform managed \
            --allow-unauthenticated

      - name: "🚀 Deploy Backup (GCP EU)"
        run: |
          if [ "${{ matrix.service }}" == "patient-service" ]; then
             ROLE_ARN="${{ secrets.EKS_PATIENT_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "doctor-service" ]; then
             ROLE_ARN="${{ secrets.EKS_DOCTOR_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "booking-service" ]; then
             ROLE_ARN="${{ secrets.EKS_BOOKING_ROLE_ARN }}"
          elif [ "${{ matrix.service }}" == "communication-service" ]; then
             ROLE_ARN="${{ secrets.EKS_COMM_ROLE_ARN }}"
          fi

          # 🟢 FIXED: Added missing \ after env-vars
          gcloud run deploy ${{ matrix.service }}-eu-backup \
            --image ${{ env.GCP_GAR }}/${{ matrix.service }}:${{ github.sha }} \
            --region europe-west3 \
            --service-account="${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}" \
            --port ${{ matrix.port }} \
            --min-instances 0 \
            --set-env-vars "NODE_ENV=production,API_PUBLIC_URL=${{ vars.GCP_DOCTOR_EU_DOMAIN }},AWS_REGION=eu-central-1,AWS_ROLE_ARN=$ROLE_ARN,AWS_EC2_METADATA_DISABLED=true,ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}" \
            --platform managed \
            --allow-unauthenticated