---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dicom-service
  labels:
    app: dicom-service
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "50%"
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dicom-service
  template:
    metadata:
      labels:
        app: dicom-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: dicom-sa
      
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000

      containers:
        - name: dicom-service
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
          
          image: __IMAGE_URI__
          imagePullPolicy: Always
          ports:
            - containerPort: 8005
          
          env:
            - name: ENVIRONMENT
              value: "production"
            - name: PORT
              value: "8005"
            - name: AWS_REGION
              value: "__AWS_REGION__"
            - name: AWS_ROLE_ARN
              value: "__AWS_ROLE_ARN__"
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "__TOKEN_FILE__"

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1000m" 
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8005
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: dicom-service
spec:
  type: ClusterIP  # 🛡️ STAYS INTERNAL. No public exposure.
  selector:
    app: dicom-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8005