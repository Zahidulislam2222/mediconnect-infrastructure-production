apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediconnect-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    
    # 🟢 HIPAA WAF & DDoS Protection (Rate Limiting)
    nginx.ingress.kubernetes.io/limit-rps: "10"         # Strict Limit: 10 requests per second per IP address
    nginx.ingress.kubernetes.io/limit-burst: "20"       # Forgiveness: Allows a sudden burst of 20 reqs during page load
    nginx.ingress.kubernetes.io/limit-connections: "10" # Concurrency: Max 10 active connections per IP
spec:
  rules:
    - http:
        paths:
          # --- COMMUNICATION SERVICE ---
          - path: /__PREFIX__(chat.*)
            pathType: Prefix
            backend:
              service:
                name: communication-service
                port:
                  number: 80
          - path: /__PREFIX__(video.*)
            pathType: Prefix
            backend:
              service:
                name: communication-service
                port:
                  number: 80
          - path: /__PREFIX__(ai.*)
            pathType: Prefix
            backend:
              service:
                name: communication-service
                port:
                  number: 80

          # --- BOOKING SERVICE ---
          - path: /__PREFIX__(appointments.*)
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /__PREFIX__(billing.*)
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /__PREFIX__(webhook.*)
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 80

          # --- DOCTOR SERVICE ---
          - path: /__PREFIX__(doctors.*)
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__(register-doctor.*) # 🟢 ADDED THIS
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__(prescription.*)
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__(ehr.*)
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80

          # --- PATIENT & FALLBACK SERVICE ---
          - path: /__PREFIX__(patients.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__(vitals.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80

          # Catch-all Default
          - path: /__PREFIX__(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80