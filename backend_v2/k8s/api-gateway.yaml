apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediconnect-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/use-regex: "true"
    
    # HIPAA Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "10"         
    nginx.ingress.kubernetes.io/limit-burst: "20"       
    nginx.ingress.kubernetes.io/limit-connections: "10" 
spec:
  rules:
    - http:
        paths:
          # COMMUNICATION
          - path: /__PREFIX__chat/?(.*)
            pathType: ImplementationSpecific 
            backend:
              service:
                name: communication-service
                port:
                  number: 80
          - path: /__PREFIX__video/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: communication-service
                port:
                  number: 80
          - path: /__PREFIX__ai/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: communication-service
                port:
                  number: 80

          # BOOKING
          - path: /__PREFIX__appointments/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /__PREFIX__billing/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /__PREFIX__analytics/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /__PREFIX__webhook/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /__PREFIX__system/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: booking-service
                port:
                  number: 80

          # DOCTOR
          - path: /__PREFIX__doctors/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__register-doctor/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__prescription/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__prescriptions/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__ehr/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__pharmacy/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__relationships/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: doctor-service
                port:
                  number: 80

          # PATIENT
          - path: /__PREFIX__patients/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__register-patient/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__verify-identity/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__public/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__stats/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__vitals/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__emergency/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__search/?(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 80

          # CATCH-ALL
          - path: /__PREFIX__(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: patient-service
                port:
                  number: 80