apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mediconnect-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"

    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
    
    # 🟢 HIPAA WAF & DDoS Protection (Rate Limiting)
    nginx.ingress.kubernetes.io/limit-rps: "10"         
    nginx.ingress.kubernetes.io/limit-burst: "20"       
    nginx.ingress.kubernetes.io/limit-connections: "10" 
spec:
  rules:
    - http:
        paths:
          # ==========================================
          # 💬 COMMUNICATION & AI SERVICE (Port 8084)
          # ==========================================
          - path: /__PREFIX__chat/?(.*)
            pathType: Prefix
            backend:
              service:
                name: communication-service
                port:
                  number: 80
          - path: /__PREFIX__video/?(.*)
            pathType: Prefix
            backend:
              service:
                name: communication-service
                port:
                  number: 80
          - path: /__PREFIX__ai/?(.*)
            pathType: Prefix
            backend:
              service:
                name: communication-service
                port:
                  number: 80

          # ==========================================
          # 📅 BOOKING & BILLING SERVICE (Port 8083)
          # ==========================================
          - path: /__PREFIX__appointments/?(.*)
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /__PREFIX__billing/?(.*)
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /__PREFIX__analytics/?(.*)
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /__PREFIX__webhook/?(.*)
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 80
          - path: /__PREFIX__system/?(.*)
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: 80

          # ==========================================
          # 🩺 DOCTOR & CLINICAL SERVICE (Port 8082)
          # ==========================================
          - path: /__PREFIX__doctors/?(.*)
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__register-doctor/?(.*)
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__prescription/?(.*)
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__prescriptions/?(.*)
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__ehr/?(.*)
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__pharmacy/?(.*)
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80
          - path: /__PREFIX__relationships/?(.*)
            pathType: Prefix
            backend:
              service:
                name: doctor-service
                port:
                  number: 80

          # ==========================================
          # 🧑‍⚕️ PATIENT & IOT SERVICE (Port 8081)
          # ==========================================
          - path: /__PREFIX__patients/?(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__register-patient/?(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__verify-identity/?(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__public/?(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__stats/?(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__vitals/?(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__emergency/?(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80
          - path: /__PREFIX__search/?(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80

          # ==========================================
          # 🛡️ CATCH-ALL FALLBACK (Root / Liveness)
          # ==========================================
          - path: /__PREFIX__(.*)
            pathType: Prefix
            backend:
              service:
                name: patient-service
                port:
                  number: 80