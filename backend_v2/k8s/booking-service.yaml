---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  labels:
    app: booking-service
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "50%"
      maxUnavailable: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: booking-sa
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000

      containers:
        - name: booking-service
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
          
          image: __IMAGE_URI__
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
          
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8083"
            - name: API_PUBLIC_URL
              value: "__PUBLIC_DOMAIN__" 
            - name: AWS_REGION
              value: "__AWS_REGION__"
            - name: AWS_ROLE_ARN
              value: "__AWS_ROLE_ARN__"
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "__TOKEN_FILE__"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/var/run/secrets/gcp/gcp-wif-config.json"

          volumeMounts:
            - name: gcp-wif-volume
              mountPath: "/var/run/secrets/gcp"
              readOnly: true

          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 10
      volumes:
        - name: gcp-wif-volume
          configMap:
            name: gcp-wif-config
            optional: true # Prevents crash loops if map is temporarily missing
---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
spec:
  type: ClusterIP
  selector:
    app: booking-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8083
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: booking-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: booking-service
  minReplicas: __MIN_REPLICAS__
  maxReplicas: __MAX_REPLICAS__
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: booking-service-pdb
spec:
  minAvailable: 50%
  selector:
    matchLabels:
      app: booking-service