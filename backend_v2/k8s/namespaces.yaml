apiVersion: v1
kind: Namespace
metadata:
  name: mediconnect-prod
---
apiVersion: v1
kind: Namespace
metadata:
  name: mediconnect-staging
---
apiVersion: v1
kind: Namespace
metadata:
  name: mediconnect-monitoring
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mediconnect-sa
  namespace: mediconnect-staging
  annotations:
    eks.amazonaws.com/role-arn: "__POD_ROLE_ARN__"
    azure.workload.identity/client-id: "__AZURE_CLIENT_ID__"
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mediconnect-sa
  namespace: mediconnect-prod
  annotations:
    eks.amazonaws.com/role-arn: "__POD_ROLE_ARN__"
    azure.workload.identity/client-id: "__AZURE_CLIENT_ID__"
  labels:
    azure.workload.identity/use: "true"