apiVersion: v1
kind: Namespace
metadata:
  name: mediconnect-prod
---
apiVersion: v1
kind: Namespace
metadata:
  name: mediconnect-staging
---
apiVersion: v1
kind: Namespace
metadata:
  name: mediconnect-monitoring
---
# ==========================================
# 🟢 1. PATIENT SERVICE IDENTITY
# ==========================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patient-sa
  namespace: mediconnect-prod
  annotations:
    eks.amazonaws.com/role-arn: "__EKS_PATIENT_ROLE_ARN__"
    azure.workload.identity/client-id: "__AZURE_PATIENT_CLIENT_ID__"
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: patient-sa
  namespace: mediconnect-staging
