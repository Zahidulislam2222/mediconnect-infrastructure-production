---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: communication-service
  labels:
    app: communication-service
spec:
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: "50%"
      maxUnavailable: 1
  selector:
    matchLabels:
      app: communication-service
  template:
    metadata:
      labels:
        app: communication-service
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: mediconnect-sa
      containers:
        - name: communication-service
          image: __IMAGE_URI__
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8084"
            - name: AWS_REGION
              value: "__AWS_REGION__"
            - name: AWS_ROLE_ARN
              value: "__AWS_ROLE_ARN__"
            - name: AWS_WEB_IDENTITY_TOKEN_FILE
              value: "__TOKEN_FILE__"
          resources:
            requests:
              cpu: "250m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 180
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: communication-service
spec:
  type: ClusterIP
  selector:
    app: communication-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8084
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: communication-service-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: communication-service
  minReplicas: __MIN_REPLICAS__
  maxReplicas: __MAX_REPLICAS__
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: communication-service-pdb
spec:
  minAvailable: 50%
  selector:
    matchLabels:
      app: communication-service