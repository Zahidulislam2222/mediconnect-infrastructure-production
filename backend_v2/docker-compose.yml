version: '3.8'
services:
  orthanc:
    image: jodogne/orthanc:latest
    ports:
      - "4242:4242" # DICOM Protocol Port
      - "8042:8042" # REST API Port
    environment:
      - ORTHANC_NAME=MediConnect_PACS
      - ORTHANC__AUTHENTICATION_ENABLED=false # Safe for local dev only
      - ORTHANC__DICOM_AET=ORTHANC
      - ORTHANC__DICOM_ALWAYS_ALLOW_STORE=true
      - ORTHANC__DICOM_ALWAYS_ALLOW_FIND=true
    volumes:
      - orthanc-storage:/var/lib/orthanc/db

volumes:
  orthanc-storage: