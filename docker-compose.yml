version: '3.8'

services:
  patient-service:
    build:
      context: .
      dockerfile: backend_v2/patient-service/Dockerfile
    ports:
      - "8081:8081"
    environment:
      - NODE_ENV=development
      - PORT=8081
      - AWS_REGION=us-east-1
    volumes:
      - ./backend_v2/patient-service:/home/node/app/patient-service
      - ./backend_v2/shared:/home/node/app/shared

  doctor-service:
    build:
      context: .
      dockerfile: backend_v2/doctor-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - NODE_ENV=development
      - PORT=8082
      - AWS_REGION=us-east-1
    volumes:
      - ./backend_v2/doctor-service:/home/node/app/doctor-service
      - ./backend_v2/shared:/home/node/app/shared

  booking-service:
    build:
      context: .
      dockerfile: backend_v2/booking-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - NODE_ENV=development
      - PORT=8083
      - AWS_REGION=us-east-1
    volumes:
      - ./backend_v2/booking-service:/home/node/app/booking-service
      - ./backend_v2/shared:/home/node/app/shared

  communication-service:
    build:
      context: .
      dockerfile: backend_v2/communication-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - NODE_ENV=development
      - PORT=8084
      - AWS_REGION=us-east-1
    volumes:
      - ./backend_v2/communication-service:/home/node/app/communication-service
      - ./backend_v2/shared:/home/node/app/shared

  admin-service:
    build:
      context: .
      dockerfile: backend_v2/admin-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      - PORT=8085
      - AWS_REGION=us-east-1

  staff-service:
    build:
      context: .
      dockerfile: backend_v2/staff-service/Dockerfile
    ports:
      - "8086:8086"
    environment:
      - NODE_ENV=development
      - PORT=8086
      - AWS_REGION=us-east-1
    volumes:
      - ./backend_v2/staff-service:/home/node/app/staff-service
      - ./backend_v2/shared:/home/node/app/shared

  dicom-service:
    build:
      context: .
      dockerfile: backend_v2/dicom-service/Dockerfile
    ports:
      - "8005:8005"
    environment:
      - PORT=8005
      - AWS_REGION=us-east-1

  frontend:
    build: ../mediconnect-hub
    ports:
      - "8080:8080"
    environment:
      - VITE_PATIENT_SERVICE_URL=http://localhost:8081
      - VITE_DOCTOR_SERVICE_URL=http://localhost:8082
      - VITE_BOOKING_SERVICE_URL=http://localhost:8083
      - VITE_COMMUNICATION_SERVICE_URL=http://localhost:8084
    depends_on:
      - patient-service
      - doctor-service
      - booking-service
      - communication-service

  # ── Kafka Event Streaming (local development) ────────────────────────
  # Start with: docker compose --profile kafka up -d kafka kafka-ui
  # Kafka UI: http://localhost:8090

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    profiles: ["kafka"]
    container_name: mediconnect-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-ui:
    image: ghcr.io/kafbat/kafka-ui:latest
    profiles: ["kafka"]
    container_name: mediconnect-kafka-ui
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mediconnect-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  kafka-data:
